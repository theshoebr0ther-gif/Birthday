<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Yashimishi ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}

body{height:100vh;overflow:hidden;color:white;background:black;}

.bg{
position:fixed;width:100%;height:100%;
background-size:cover;background-position:center;
filter:blur(12px) brightness(0.5);
transition:1.5s;z-index:-1;
}

.container{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:90%;max-width:420px;
padding:25px;border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
text-align:center;
}

button{
padding:12px 16px;margin-top:12px;
border:none;border-radius:12px;
background:white;color:#ff4b6e;
font-weight:600;cursor:pointer;
}

.candle{animation:flicker 1s infinite alternate;}
@keyframes flicker{50%{transform:scale(1.1);opacity:0.7;}}

.glow{animation:glow 0.5s;}
@keyframes glow{50%{background:rgba(255,200,150,0.3);}}

.heart{
position:absolute;bottom:0;
animation:float 6s linear infinite;
}
@keyframes float{
to{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<audio id="blowSound">
<source src="https://actions.google.com/sounds/v1/human_voices/blow.ogg">
</audio>

<div class="container" id="card">
<h2>🎂 Happy Birthday</h2>
<h3>Yashimishi ❤️</h3>
<button onclick="start()">Open</button>
</div>

<script>

/* ✅ FIXED IMAGE PATHS */
let images=[
"1.JPG",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.JPG",
"9.jpg",
"10.jpg",
"11.jpg",
"12.jpg",
"13.jpg",
"14.jpg"
];

let i=0;

/* START */
function start(){
let music=document.getElementById("music");
music.volume=0.3;
music.play().catch(()=>{});

startSlideshow();
document.getElementById("bg").style.backgroundImage=`url(${images[0]})`;

showMessage();
}

/* SLIDESHOW */
function startSlideshow(){
setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("bg").style.backgroundImage=`url(${images[i]})`;
},4000);
}

/* MESSAGE */
function showMessage(){
document.getElementById("card").innerHTML=`
<p id="msg"></p>
<button onclick="startGame()">Continue 🎂</button>
`;

type(`Happy Birthday Yashimishi,

You are the most precious gift anyone could ever have.

And I’m really lucky to have you in my life ❤️`);
}

/* TYPE */
function type(t){
let i=0, el=document.getElementById("msg");
(function(){
if(i<t.length){
el.innerHTML+=t[i++];
setTimeout(arguments.callee,25);
}
})();
}

/* 🎂 GAME */
let c=0;

function startGame(){
document.getElementById("card").innerHTML=`
<h3>Make a Wish 🎂</h3>
<div style="font-size:60px;">🎂</div>
${[1,2,3,4,5].map(()=>`
<span class="candle" onclick="blow(this)" style="font-size:28px;">🕯️</span>
`).join("")}
`;
}

function blow(el){
if(el.innerHTML==="💨") return;

el.innerHTML="💨";
c++;

let s=document.getElementById("blowSound");
s.play().catch(()=>{});

document.body.classList.add("glow");
setTimeout(()=>document.body.classList.remove("glow"),400);

if(c===5){
setTimeout(()=>ask(),800);
}
}

/* ASK */
function ask(){
document.getElementById("card").innerHTML=`
<h2>Meet me today? ❤️</h2>
<button onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 😜</button>
`;
}

function move(){
let b=document.getElementById("no");
b.style.position="absolute";
b.style.top=Math.random()*80+"%";
b.style.left=Math.random()*80+"%";
}

/* FINAL */
function yes(){
document.getElementById("card").innerHTML=`
<h2>❤️</h2>
<p>Thank you so much<br>
Now call Mr Manish ☎️<br>
and tell him he is blessed to see you today ❤️</p>
`;

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yashimishi ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}

body{
height:100vh;
background:#0f0f0f;
color:white;
overflow:hidden;
}

/* Background */
.bg{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(15px) brightness(0.5);
transition:1.8s ease;
z-index:-1;
}

/* Card */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.95);
width:92%;
max-width:420px;
padding:25px;
border-radius:28px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:fadeUp 0.8s ease forwards;
}

/* Animations */
@keyframes fadeUp{
from{opacity:0; transform:translate(-50%,-40%) scale(0.9);}
to{opacity:1; transform:translate(-50%,-50%) scale(1);}
}

/* Button */
button{
margin-top:18px;
padding:14px;
width:100%;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff4b6e,#ff758c);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
position:relative;
overflow:hidden;
}

/* Ripple */
button::after{
content:"";
position:absolute;
width:10px;height:10px;
background:white;
opacity:0.5;
border-radius:50%;
transform:scale(0);
animation:ripple 0.6s linear;
}
@keyframes ripple{
to{transform:scale(15);opacity:0;}
}

/* Candle */
.candle{
font-size:30px;
margin:6px;
cursor:pointer;
animation:flicker 1s infinite alternate;
}
@keyframes flicker{
50%{transform:scale(1.1);opacity:0.7;}
}

/* Glow */
.glow{
animation:glowFlash 0.5s;
}
@keyframes glowFlash{
50%{background:rgba(255,180,120,0.2);}
}

/* Heartbeat */
.pulse{
animation:pulse 1s infinite;
}
@keyframes pulse{
50%{transform:scale(1.05);}
}

/* Hearts */
.heart{
position:absolute;
bottom:0;
animation:float 6s linear infinite;
}
@keyframes float{
to{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<audio id="blowSound">
<source src="https://actions.google.com/sounds/v1/human_voices/blow.ogg">
</audio>

<div class="container" id="card">
<h2>🎂 Happy Birthday</h2>
<h3>Yashimishi ❤️</h3>
<button onclick="start(event)">Open</button>
</div>

<script>

/* IMAGES */
let images=[
"1.JPG","2.jpg","3.jpg","4.jpg","5.jpg",
"6.jpg","7.jpg","8.JPG","9.jpg","10.jpg",
"11.jpg","12.jpg","13.jpg","14.jpg"
];

let i=0;

/* HAPTIC */
function vibrate(){
if(navigator.vibrate) navigator.vibrate(40);
}

/* MUSIC FADE */
function fadeMusic(){
let m=document.getElementById("music");
m.volume=0;
let v=0;
let fade=setInterval(()=>{
v+=0.05;
m.volume=v;
if(v>=0.3) clearInterval(fade);
},200);
}

/* START */
function start(e){
vibrate();
fadeMusic();

document.getElementById("music").play().catch(()=>{});

startSlideshow();
document.getElementById("bg").style.backgroundImage=`url(${images[0]})`;

transition(showMessage);
}

/* SLIDESHOW */
function startSlideshow(){
setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("bg").style.backgroundImage=`url(${images[i]})`;
},4000);
}

/* TRANSITION */
function transition(next){
let card=document.getElementById("card");
card.style.opacity=0;
setTimeout(()=>{
next();
card.style.opacity=1;
},400);
}

/* MESSAGE */
function showMessage(){
document.getElementById("card").innerHTML=`
<p id="msg"></p>
<button onclick="transition(startGame)">Continue 🎂</button>
`;

type(`Happy Birthday Yashimishi,

You are the most precious gift anyone could ever have.

And I’m lucky every single day to have you ❤️`);
}

/* TYPE */
function type(t){
let i=0, el=document.getElementById("msg");
(function(){
if(i<t.length){
el.innerHTML+=t[i++];
setTimeout(arguments.callee,25);
}
})();
}

/* GAME */
let c=0;
function startGame(){
document.getElementById("card").innerHTML=`
<h2 class="pulse">Make a Wish 🎂</h2>
<div style="font-size:60px;">🎂</div>
${[1,2,3,4,5].map(()=>`
<span class="candle" onclick="blow(this)">🕯️</span>
`).join("")}
`;
}

/* BLOW */
function blow(el){
if(el.innerHTML==="💨") return;

vibrate();

el.innerHTML="💨";
c++;

document.getElementById("blowSound").play().catch(()=>{});
document.body.classList.add("glow");
setTimeout(()=>document.body.classList.remove("glow"),400);

if(c===5){
setTimeout(()=>transition(ask),800);
}
}

/* ASK */
function ask(){
document.getElementById("card").innerHTML=`
<h2>Meet me today? ❤️</h2>
<button onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 😜</button>
`;
}

/* MOVE */
function move(){
let b=document.getElementById("no");
b.style.position="absolute";
b.style.top=Math.random()*70+"%";
b.style.left=Math.random()*70+"%";
}

/* FINAL */
function yes(){
vibrate();

document.getElementById("card").innerHTML=`
<h2>❤️</h2>
<p>Thank you so much<br>
Now call Mr Manish ☎️<br>
and tell him he is blessed to see you today ❤️</p>
`;

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Happy Birthday Yashimishi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
-webkit-tap-highlight-color: transparent;
}

body{
height:100vh;
overflow:hidden;
color:white;
background:black;
padding:env(safe-area-inset);
}

/* Cinematic background */
.bg-layer{
position:fixed;
width:110%;
height:110%;
top:-5%;
left:-5%;
background-size:cover;
background-position:center;
filter:blur(10px) brightness(0.5);
transition:opacity 1.5s ease;
z-index:-2;
animation:zoom 12s ease-in-out infinite alternate;
}

.bg-layer.top{z-index:-1;}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

/* Card */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
text-align:center;
}

/* Button */
button{
padding:14px 18px;
margin-top:12px;
border:none;
border-radius:14px;
background:white;
color:#ff4b6e;
font-weight:600;
font-size:16px;
cursor:pointer;
}

/* Candle */
.candle{animation:flicker 1s infinite alternate;}
@keyframes flicker{
50%{transform:scale(1.1);opacity:0.7;}
}

/* Glow */
.glow{animation:glow 0.5s;}
@keyframes glow{
50%{background:rgba(255,200,150,0.3);}
}

/* Hearts */
.heart{
position:absolute;
bottom:0;
animation:float 6s linear infinite;
}
@keyframes float{
to{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="bg-layer" id="bg1"></div>
<div class="bg-layer top" id="bg2"></div>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<audio id="blowSound">
<source src="https://actions.google.com/sounds/v1/human_voices/blow.ogg">
</audio>

<div class="container" id="card">
<h2>🎂 Happy Birthday</h2>
<h3>❤️ My Yashimishi ❤️</h3>
<button onclick="start()">Open</button>
</div>

<script>

/* IMAGES */
let images=[
"1.JPG","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg",
"8.JPG","9.jpg","10.jpg","11.jpg","12.jpg","13.jpg","14.jpg"
];

let i=0;
let currentLayer=1;

function preloadImages(){
images.forEach(src=>{
let img=new Image();
img.src=src;
});
}

/* 🎬 SLIDESHOW (FIXED FOR iPHONE) */
function startSlideshow(){

let bg1=document.getElementById("bg1");
let bg2=document.getElementById("bg2");

/* show instantly without delay */
bg1.style.backgroundImage=`url(${images[0]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;

/* slight delay before animation (important for iPhone) */
setTimeout(()=>{

let index=0;

setInterval(()=>{
index=(index+1)%images.length;

let active = currentLayer===1 ? bg1 : bg2;
let next = currentLayer===1 ? bg2 : bg1;

next.style.backgroundImage=`url(${images[index]})`;
next.style.opacity=1;
active.style.opacity=0;

currentLayer = currentLayer===1 ? 2 : 1;

},5000);

},800); // 🔥 key fix (gives browser time to render)
}
}

/* AUTO START SLIDESHOW */
window.onload = () => {
preloadImages();   // preload first
startSlideshow();  // then start
};

/* START */
function start(){
let music=document.getElementById("music");

music.pause();
music.currentTime=0;
music.volume=0.4;
music.play().catch(()=>{});

showMessage();
}

/* MESSAGE */
function showMessage(){
document.getElementById("card").innerHTML=`
<p id="msg"></p>
<button onclick="startGame()">Continue 🎂</button>
`;

type(`Happy Birthday Betu❤️,

You are the most precious gift anyone could ever have.

And I’m lucky every single day to have you ❤️

May god will always bless you and you bless me with your
smile😁

Always stay safe and healthy. When you smile is

the most beautiful thing to give these तुच्छ people

❤️`);
}

/* ⌨️ SYNC TYPEWRITER */
function type(text){

let el=document.getElementById("msg");
el.innerHTML="";
let i=0;
let music=document.getElementById("music");

function typing(){

if(i<text.length){

let speed=35;

if(music.currentTime<5) speed=60;
else if(music.currentTime<15) speed=35;
else speed=25;

el.innerHTML+=text.charAt(i);
i++;

setTimeout(typing,speed);
}
}

typing();
}

/* 🎂 GAME */
let c=0;

function startGame(){
document.getElementById("card").innerHTML=`
<h3>Make a Wish 🎂</h3>
<div style="font-size:60px;">🎂</div>
${[1,2,3,4,5].map(()=>`
<span class="candle" onclick="blow(this)" style="font-size:30px;margin:6px;">🕯️</span>
`).join("")}
`;
}

function blow(el){
if(el.innerHTML==="💨") return;

el.innerHTML="💨";
c++;

let s=document.getElementById("blowSound");
s.currentTime=0;
s.play().catch(()=>{});

document.body.classList.add("glow");
setTimeout(()=>document.body.classList.remove("glow"),400);

if(c===5){
setTimeout(()=>ask(),800);
}
}

/* ASK */
function ask(){
document.getElementById("card").innerHTML=`
<h2>Meet me today? ❤️</h2>
<button onclick="yes()">Yes 💖</button>
<button id="no" ontouchstart="move()" onmouseover="move()">No 😜</button>
`;
}

function move(){
let b=document.getElementById("no");
b.style.position="absolute";
b.style.top=Math.random()*70+"%";
b.style.left=Math.random()*70+"%";
}

/* FINAL */
function yes(){
document.getElementById("card").innerHTML=`
<h2>❤️</h2>
<p>Thank you so much<br>
Now call Mr Manish ☎️<br>
and tell him he is blessed to see you today ❤️</p>
`;

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

</script>

</body>
</html>
